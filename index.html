      "offers": [

        { "@type": "Offer", "price": "99", "priceCurrency": "USD", "name": "Pro", "priceSpecification": { "@type": "UnitPriceSpecification", "billingDuration": "P1M" } },
        { "@type": "Offer", "price": "0", "priceCurrency": "USD", "name": "Enterprise", "description": "Custom pricing for teams" }
      ],
      "author": { "@type": "Organization", "name": "Infinite Data Solutions", "url": "https://www.infinitedatasolutions.com" },

    <!-- JSON-LD: WebSite with SearchAction (enables Google search box) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "BasedData",
      "url": "https://baseddata.lovable.app",
      "potentialAction": {
        "@type": "SearchAction",
        "target": {
          "@type": "EntryPoint",
          "urlTemplate": "https://baseddata.lovable.app/search?q={search_term_string}"
        },
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- JSON-LD: FAQ (boosts rich snippet eligibility) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What data sources does BasedData track?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BasedData tracks 9 federal data sources including USASpending.gov, SAM.gov, FPDS, SBIR/STTR, NSF, SEC EDGAR, GSA CALC+, ClinicalTrials.gov, and USPTO patent data."
          }
        },
        {
          "@type": "Question",
          "name": "How often is BasedData updated?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "BasedData's autonomous pipeline updates data every 4 hours, ensuring you always have the latest contract awards, grant announcements, and opportunity postings."
          }
        },
        {
          "@type": "Question",
          "name": "Is BasedData free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes, BasedData offers a free tier with access to entity search, contract data, and basic analytics. Pro plans start at $99/month for advanced features including AI intelligence, unlimited exports, and API access."
          }
        },
        {
          "@type": "Question",
          "name": "What types of government contracts can I track?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "You can track federal contracts, grants, IDVs (Indefinite Delivery Vehicles), SBIR/STTR awards, GSA schedule contracts, and active SAM.gov opportunities across all agencies and all 50 states."
          }
        }
      ]
    }
    </script>
