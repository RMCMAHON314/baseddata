<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BasedData — Offline</title>
  <style>
    body { margin:0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0a0a0b; color: #e5e5e5; display: flex; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
    .container { max-width: 400px; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #a1a1aa; line-height: 1.6; font-size: 0.95rem; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    button { margin-top: 1.5rem; padding: 0.75rem 2rem; border-radius: 0.5rem; border: 1px solid #3b82f6; background: transparent; color: #3b82f6; font-weight: 600; cursor: pointer; font-size: 0.9rem; }
    button:hover { background: #3b82f6; color: #fff; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're offline</h1>
    <p>BasedData requires an internet connection to access live government data. Please check your connection and try again.</p>
    <button onclick="location.reload()">Retry Connection</button>
  </div>
</body>
</html>
